{% extends 'base.html' %}{% block title %}Parol o'zgartirish{% endblock %}
{% block extra_css %}<style>
.aw{min-height:calc(100vh - 120px);display:flex;align-items:center;justify-content:center;}
.ab{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:44px 38px;box-shadow:var(--shadow);}
.at{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:900;margin-bottom:30px;}
.fl{float:right;font-size:.72rem;color:var(--accent);text-decoration:none;}
</style>{% endblock %}
{% block content %}
<div class="aw"><div class="ab">
  <div class="at">Parol o'zgartirish</div>
  {% if messages %}
    {% for m in messages %}
      <div class="alert alert-{{ m.tags }}" style="margin-bottom:16px;">{{ m }}</div>
    {% endfor %}
  {% endif %}
  <form method="post" novalidate>{% csrf_token %}
    <div class="form-group">
      <label>Eski parol <a href="{% url 'password_reset' %}" class="fl">Unutdingizmi?</a></label>
      <input type="password" name="old_password" placeholder="••••••••" autofocus required>
    </div>
    <div class="form-group">
      <label>Yangi parol</label>
      <input type="password" name="new_password1" placeholder="Kamida 8 belgi" required>
    </div>
    <div class="form-group">
      <label>Tasdiqlang</label>
      <input type="password" name="new_password2" placeholder="Takrorlang" required>
    </div>
    <div style="display:flex;gap:10px;">
      <a href="{% url 'profile' request.user.username %}" class="btn btn-outline" style="flex:1;justify-content:center;">Bekor</a>
      <button type="submit" class="btn btn-primary" style="flex:2;justify-content:center;padding:12px;">
        <i class="fas fa-lock"></i> Saqlash
      </button>
    </div>
  </form>
</div></div>
{% endblock %}
